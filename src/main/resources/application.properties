spring.application.name=Cargo Assign

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===============================
# Database (MariaDB local)
# ===============================
spring.datasource.url=jdbc:mariadb://localhost:3306/cargo_assign_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.enabled=true

# ===============================
# External Services
# ===============================
imagekit.private-key=private_lCapg1kS3DL3P7/n1lxEM7o7zkk=


# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:local-dev-secret-key-please-change}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# Server (Required for Render)
# ===============================
server.port=${PORT:8080}
server.tomcat.max-part-count=20
server.tomcat.max-http-form-post-size=30MB
server.tomcat.max-swallow-size=30MB

