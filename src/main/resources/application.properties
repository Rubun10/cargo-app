spring.application.name=CargoAssign

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===============================
# Database (XAMPP MariaDB local / override with env on server)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/cargo_assign_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# ===============================
# External Services
# ===============================
imagekit.private-key=private_lCapg1kS3DL3P7/n1lxEM7o7zkk=

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:local-dev-secret-key-please-change}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# Server (Required for Render)
# ===============================
server.port=${PORT:8080}
server.tomcat.max-part-count=20
