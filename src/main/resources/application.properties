spring.application.name=Cargo Assign

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ===============================
# Database (PostgreSQL on Render / MariaDB local)
# ===============================
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/cargo_assign_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.MariaDBDialect}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MariaDBDialect}

# ===============================
# File Upload
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.enabled=true

# ===============================
# External Services
# ===============================
imagekit.private-key=${IMAGEKIT_PRIVATE_KEY:}

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:local-dev-secret-key-please-change}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# Server (Required for Render)
# ===============================
server.port=${PORT:8080}
server.tomcat.max-part-count=20
server.tomcat.max-http-form-post-size=30MB
server.tomcat.max-swallow-size=30MB

