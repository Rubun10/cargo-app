<div class="content">
    <div class="title">
        <h3>Driver Dashboard</h3>
    </div>
    
    <div class="cards-container">
        <div class="card" onclick="window.location.href='driver/active-trips'">
            <div class="card-title">Active Trips</div>
            <div class="card-description">View and manage all your ongoing trips and their current status.</div>
        </div>
        
        <div class="card" onclick="window.location.href='driver/my-trips'">
            <div class="card-title" >My Trips</div>
            <div class="card-description">Access and manage all your upcoming, ongoing, and past trips in one place.</div>
        </div>
     
		
        <div class="card" onclick="goTo('creditsReviewPage')">
            <div class="card-title">Credits & Rewards</div>
            <div class="card-description">View cargo credits earned, shipper name, and star reviews in one page.</div>
        </div>
        <div class="btn" onclick="window.location.href='/dashboard'"><i class="fas fa-arrow-left"></i> Back to Dashboard </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
