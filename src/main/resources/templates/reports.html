<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports | Cargo Assign</title>
    <style>
        :root {
            --bg: #f2f5ff;
            --surface: #ffffff;
            --ink: #1f2937;
            --muted: #6b7280;
            --primary: #4338ca;
            --primary-soft: #eef2ff;
            --success: #0f766e;
            --warning: #b45309;
            --danger: #be123c;
            --line: #e5e7eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 15% 20%, rgba(67, 56, 202, 0.12), transparent 35%),
                radial-gradient(circle at 90% 90%, rgba(15, 118, 110, 0.12), transparent 30%),
                var(--bg);
            min-height: 100vh;
            padding: 28px 16px;
        }

        .page {
            max-width: 1140px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid #e9ecf5;
            border-radius: 16px;
            box-shadow: 0 18px 36px rgba(25, 35, 58, 0.08);
            overflow: hidden;
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 22px 24px;
            background: linear-gradient(120deg, #4338ca 0%, #1d4ed8 100%);
            color: #fff;
        }

        .top h1 {
            font-size: clamp(1.3rem, 2.2vw, 1.8rem);
        }

        .top p {
            color: #dbeafe;
            font-size: 0.92rem;
            margin-top: 4px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 14px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.92;
        }

        .btn-primary {
            background: #ffffff;
            color: #312e81;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.18);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .section {
            padding: 22px 24px 26px;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .field label {
            display: block;
            font-size: 0.82rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .field input,
        .field select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 11px;
            font-size: 0.9rem;
            color: var(--ink);
            background: #fff;
        }

        .metrics {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .metric {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 14px;
        }

        .metric-title {
            font-size: 0.82rem;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .metric-value {
            font-size: 1.35rem;
            font-weight: 700;
        }

        .metric:nth-child(1) .metric-value {
            color: var(--primary);
        }

        .metric:nth-child(2) .metric-value {
            color: var(--success);
        }

        .metric:nth-child(3) .metric-value {
            color: var(--warning);
        }

        .metric:nth-child(4) .metric-value {
            color: var(--danger);
        }

        .table-wrap {
            margin-top: 18px;
            border: 1px solid var(--line);
            border-radius: 12px;
            overflow-x: auto;
            background: #fff;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            padding: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 720px;
        }

        th,
        td {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 1px solid #edf0f7;
            font-size: 0.9rem;
        }

        th {
            background: var(--primary-soft);
            color: #3730a3;
            font-size: 0.82rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        tbody tr:hover {
            background: #f8faff;
        }

        .chip {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 999px;
            font-size: 0.76rem;
            font-weight: 700;
        }

        .chip.success {
            background: #dcfce7;
            color: #166534;
        }

        .chip.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .chip.cancelled {
            background: #ffe4e6;
            color: #be123c;
        }

        .footer-nav {
            margin-top: 18px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 980px) {
            .filters,
            .metrics {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .top {
                flex-direction: column;
                align-items: flex-start;
            }

            .filters,
            .metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="top">
            <div>
                <h1>My Reports</h1>
                <p>View your own trips, deliveries, earnings, and recent activity.</p>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="exportBtn" type="button">Export CSV</button>
                <button class="btn btn-secondary" id="printBtn" type="button">Print</button>
            </div>
        </header>

        <section class="section">
            <div class="filters">
                <div class="field">
                    <label for="fromDate">From Date</label>
                    <input id="fromDate" type="date">
                </div>
                <div class="field">
                    <label for="toDate">To Date</label>
                    <input id="toDate" type="date">
                </div>
                <div class="field">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="">All Statuses</option>
                        <option value="POSTED">Posted</option>
                        <option value="AVAILABLE">Available</option>
                        <option value="PENDING">Pending</option>
                        <option value="CONFIRM">Confirm</option>
                        <option value="DRIVER_REQUESTED">Driver Requested</option>
                        <option value="SHIPPER_CONFIRMED">Shipper Confirmed</option>
                        <option value="ACTIVE">Active</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>
                <div class="field">
                    <label for="searchRoute">Route Search</label>
                    <input id="searchRoute" type="text" placeholder="Pickup / Drop / ID">
                </div>
            </div>

            <div class="metrics">
                <article class="metric">
                    <p class="metric-title">Total Loads</p>
                    <p class="metric-value" id="metricTotal">0</p>
                </article>
                <article class="metric">
                    <p class="metric-title">Completed</p>
                    <p class="metric-value" id="metricCompleted">0</p>
                </article>
                <article class="metric">
                    <p class="metric-title">In Progress</p>
                    <p class="metric-value" id="metricInProgress">0</p>
                </article>
                <article class="metric">
                    <p class="metric-title">Total Earnings</p>
                    <p class="metric-value" id="metricEarnings">Rs. 0</p>
                </article>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Trip ID</th>
                            <th>My Route</th>
                            <th>Partner</th>
                            <th>Vehicle</th>
                            <th>Status</th>
                            <th>My Earnings</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="empty" colspan="6">Loading reports...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="footer-nav">
                <a class="back-link" href="/dashboard">Back to Dashboard</a>
            </div>
        </section>
    </main>
    <script>
        const reportsApi = "/api/reports";
        const tbody = document.querySelector("tbody");
        const fromDate = document.getElementById("fromDate");
        const toDate = document.getElementById("toDate");
        const status = document.getElementById("status");
        const searchRoute = document.getElementById("searchRoute");
        const metricTotal = document.getElementById("metricTotal");
        const metricCompleted = document.getElementById("metricCompleted");
        const metricInProgress = document.getElementById("metricInProgress");
        const metricEarnings = document.getElementById("metricEarnings");
        const exportBtn = document.getElementById("exportBtn");
        const printBtn = document.getElementById("printBtn");

        let reportLoads = [];

        const inProgressStatuses = new Set([
            "POSTED", "AVAILABLE", "PENDING", "CONFIRM", "DRIVER_REQUESTED", "SHIPPER_CONFIRMED", "ACTIVE"
        ]);

        function toUpper(value) {
            return (value || "").toString().trim().toUpperCase();
        }

        function formatStatus(value) {
            return toUpper(value).replaceAll("_", " ") || "-";
        }

        function statusChipClass(value) {
            const st = toUpper(value);
            if (st === "COMPLETED") return "success";
            if (inProgressStatuses.has(st)) return "pending";
            return "cancelled";
        }

        function formatMoney(value) {
            const amount = Number(value) || 0;
            return "Rs. " + amount.toLocaleString("en-IN");
        }

        function toInputDate(dateString) {
            if (!dateString) return "";
            return dateString.slice(0, 10);
        }

        function getFilteredLoads() {
            const from = fromDate.value;
            const to = toDate.value;
            const selectedStatus = toUpper(status.value);
            const search = toUpper(searchRoute.value);

            return reportLoads.filter(load => {
                const expected = toInputDate(load.expectedDate);
                const route = `${load.pickupLocation || ""} ${load.dropLocation || ""} ${load.loadId || ""}`;
                const loadStatus = toUpper(load.status);

                if (from && (!expected || expected < from)) return false;
                if (to && (!expected || expected > to)) return false;
                if (selectedStatus && loadStatus !== selectedStatus) return false;
                if (search && !toUpper(route).includes(search)) return false;
                return true;
            });
        }

        function renderMetrics() {
            const completed = reportLoads.filter(l => toUpper(l.status) === "COMPLETED").length;
            const inProgress = reportLoads.filter(l => inProgressStatuses.has(toUpper(l.status))).length;
            const earnings = reportLoads
                .filter(l => toUpper(l.status) === "COMPLETED")
                .reduce((sum, l) => sum + (Number(l.price) || 0), 0);

            metricTotal.textContent = reportLoads.length;
            metricCompleted.textContent = completed;
            metricInProgress.textContent = inProgress;
            metricEarnings.textContent = formatMoney(earnings);
        }

        function renderTable() {
            const loads = getFilteredLoads();

            if (loads.length === 0) {
                tbody.innerHTML = `<tr><td class="empty" colspan="6">No reports found for the current filters.</td></tr>`;
                return;
            }

            tbody.innerHTML = loads.map(load => {
                const route = `${load.pickupLocation || "-"} -> ${load.dropLocation || "-"}`;
                const partner = load.shipperName || load.driverName || "-";
                const vehicle = load.loadType || "-";
                const st = formatStatus(load.status);
                const chip = statusChipClass(load.status);
                return `
                    <tr>
                        <td>${load.loadId || "-"}</td>
                        <td>${route}</td>
                        <td>${partner}</td>
                        <td>${vehicle}</td>
                        <td><span class="chip ${chip}">${st}</span></td>
                        <td>${formatMoney(load.price)}</td>
                    </tr>
                `;
            }).join("");
        }

        function exportCsv() {
            const loads = getFilteredLoads();
            if (loads.length === 0) return;

            const rows = [
                ["Load ID", "Route", "Partner", "Vehicle", "Status", "Amount"]
            ];

            loads.forEach(load => {
                rows.push([
                    load.loadId || "",
                    `${load.pickupLocation || ""} -> ${load.dropLocation || ""}`,
                    load.shipperName || load.driverName || "",
                    load.loadType || "",
                    formatStatus(load.status),
                    (Number(load.price) || 0).toString()
                ]);
            });

            const csv = rows.map(r => r.map(v => `"${String(v).replaceAll("\"", "\"\"")}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "my-reports.csv";
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        async function loadReports() {
            try {
                const res = await fetch(reportsApi, { credentials: "include" });
                if (res.status === 401) {
                    window.location.href = "/login";
                    return;
                }
                if (!res.ok) {
                    throw new Error("Failed to load reports");
                }
                reportLoads = await res.json();
                renderMetrics();
                renderTable();
            } catch (error) {
                tbody.innerHTML = `<tr><td class="empty" colspan="6">Unable to load reports.</td></tr>`;
            }
        }

        [fromDate, toDate, status, searchRoute].forEach(el => el.addEventListener("input", renderTable));
        exportBtn.addEventListener("click", exportCsv);
        printBtn.addEventListener("click", () => window.print());
        loadReports();
    </script>
    <script src="/js/completionPopperGlobal.js"></script>
</body>
</html>
