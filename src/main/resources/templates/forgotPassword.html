<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Forgot Password</title>
	<style>
		body { font-family: Arial, sans-serif; background: #f4f4f4; }
		.container { max-width: 400px; margin: 40px auto; background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		.hidden { display: none; }
		.success { color: green; }
		error { color: red; }
		label { display: block; margin-top: 12px; }
		input { width: 100%; padding: 8px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; }
		button { margin-top: 16px; width: 100%; padding: 10px; border: none; border-radius: 4px; background: #007bff; color: #fff; font-size: 16px; cursor: pointer; }
		button:disabled { background: #aaa; }
		/* Popup overlay styles */
    .success-popup{
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			background: rgba(0,0,0,0.3);
			display: flex;
			align-items: center;
			justify-content: center;
			z-index: 9999;
		}
		#successPopup .popup-content {
			background: #fff;
			padding: 32px 24px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.2);
			text-align: center;
			min-width: 280px;
		}
	</style>
</head>
<body>
<div class="container">
	<h2>Forgot Password</h2>
	<div id="step1">
		<label for="email">Enter your email:</label>
		<input type="email" id="email" required>
		<button id="checkEmailBtn">Next</button>
		<div id="step1Msg"></div>
	</div>
	<div id="stepCaptcha" class="hidden">
		<label id="captchaLabel"></label>
		<input type="text" id="captchaInput" required>
		<button id="captchaBtn">Verify</button>
		<div id="captchaMsg"></div>
	</div>
	<div id="stepPassword" class="hidden">
		<label for="newPassword">New Password:</label>
		<input type="password" id="newPassword" required>
		<label for="confirmPassword">Confirm Password:</label>
		<input type="password" id="confirmPassword" required>
		<button id="resetBtn">Change Password</button>
		<div id="stepPasswordMsg"></div>
	</div>
	<div id="successPopup" class="hidden">
		<div class="popup-content">
			<h3>Password changed successfully!</h3>
			<button id="redirectBtn">Go to Login</button>
		</div>
	</div>
</div>
<script>

const step1 = document.getElementById('step1');
const stepCaptcha = document.getElementById('stepCaptcha');
const stepPassword = document.getElementById('stepPassword');
const checkEmailBtn = document.getElementById('checkEmailBtn');
const captchaBtn = document.getElementById('captchaBtn');
const resetBtn = document.getElementById('resetBtn');
const step1Msg = document.getElementById('step1Msg');
const captchaMsg = document.getElementById('captchaMsg');
const stepPasswordMsg = document.getElementById('stepPasswordMsg');
const captchaLabel = document.getElementById('captchaLabel');
const successPopup = document.getElementById('successPopup');
const redirectBtn = document.getElementById('redirectBtn');

// Force-hide popup on page load

let captchaAnswer = '';

checkEmailBtn.onclick = async function() {
	step1Msg.textContent = '';
	const email = document.getElementById('email').value.trim();
	if (!email) {
		step1Msg.textContent = 'Please enter your email.';
		step1Msg.className = 'error';
		return;
	}
	checkEmailBtn.disabled = true;
	try {
		const res = await fetch('/api/auth/check-email', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ email })
		});
		const data = await res.json();
		if (res.ok && data.exists) {
			// Generate simple math captcha
			const a = Math.floor(Math.random() * 10) + 1;
			const b = Math.floor(Math.random() * 10) + 1;
			captchaAnswer = (a + b).toString();
			captchaLabel.textContent = `CAPTCHA: What is ${a} + ${b}?`;
			step1.classList.add('hidden');
			stepCaptcha.classList.remove('hidden');
			captchaMsg.textContent = '';
		} else {
			step1Msg.textContent = data.message || 'Email not found.';
			step1Msg.className = 'error';
			checkEmailBtn.disabled = false;
		}
	} catch (err) {
		step1Msg.textContent = 'Error: ' + err;
		step1Msg.className = 'error';
		checkEmailBtn.disabled = false;
	}
};

captchaBtn.onclick = function() {
	captchaMsg.textContent = '';
	const input = document.getElementById('captchaInput').value.trim();
	if (input !== captchaAnswer) {
		captchaMsg.textContent = 'CAPTCHA incorrect.';
		captchaMsg.className = 'error';
		return;
	}
	stepCaptcha.classList.add('hidden');
	stepPassword.classList.remove('hidden');
	stepPasswordMsg.textContent = '';
};

resetBtn.onclick = async function() {
	stepPasswordMsg.textContent = '';
	const email = document.getElementById('email').value.trim();
	const newPassword = document.getElementById('newPassword').value;
	const confirmPassword = document.getElementById('confirmPassword').value;
	if (!newPassword || !confirmPassword) {
		stepPasswordMsg.textContent = 'Please enter new password and confirm.';
		stepPasswordMsg.className = 'error';
		return;
	}
	if (newPassword !== confirmPassword) {
		stepPasswordMsg.textContent = 'Passwords do not match.';
		stepPasswordMsg.className = 'error';
		return;
	}
	resetBtn.disabled = true;
	try {
		const res = await fetch('/api/auth/reset-password', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ email, newPassword })
		});
		const data = await res.json();
		if (res.ok && data.message && data.message.toLowerCase().includes('success')) {
			successPopup.classList.remove('hidden');
		} else {
			stepPasswordMsg.textContent = data.message || 'Failed to reset password.';
			stepPasswordMsg.className = 'error';
			resetBtn.disabled = false;
		}
	} catch (err) {
		stepPasswordMsg.textContent = 'Error: ' + err;
		stepPasswordMsg.className = 'error';
		resetBtn.disabled = false;
	}
};

redirectBtn.onclick = function() {
	window.location.href = '/login';
};
</script>
</body>
</html>
