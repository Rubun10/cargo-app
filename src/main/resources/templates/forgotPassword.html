<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cargo Assign - Forgot Password</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f7fb;
    }

    .container {
      width: 380px;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    .logo {
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #1e40af;
      margin-bottom: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 8px;
      color: #111827;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    button {
      width: 100%;
      padding: 12px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1e40af;
    }

    .message {
      background: #ecfdf5;
      color: #065f46;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      text-align: center;
      display: none;
      border: 1px solid #a7f3d0;
    }

    .link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Cargo Assign</div>
    <h2>Forgot Password</h2>
    <div class="subtitle">Enter your email and we will send reset instructions.</div>

    <div id="message" class="message"></div>

    <form id="forgotForm">
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          name="email"
          id="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <button type="submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="link">
      Remembered your password?
      <a href="/login">Back to login</a>
    </div>
  </div>

  <script>
    document.getElementById("forgotForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      if (!email) return;

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.textContent = "Sending...";

      const message = document.getElementById("message");
      message.textContent = "If this email exists, reset instructions have been sent.";
      message.style.display = "block";

      setTimeout(() => {
        window.location.href = "/login";
      }, 1600);
    });
  </script>
</body>
</html>
